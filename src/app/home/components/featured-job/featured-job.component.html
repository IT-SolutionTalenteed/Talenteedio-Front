<div class="featured-job section">
  <div class="container">
    <app-loader class="container-our-customer" [isLoading]="jobsLoading">
      <div class="jobs-grid" *ngIf="jobs && jobs.length > 0">
        <app-job-item *ngFor="let job of jobs" [job]="job"></app-job-item>
      </div>
      <div class="no-jobs" *ngIf="!jobs || jobs.length === 0">
        <p>Aucune offre d'emploi disponible pour le moment.</p>
      </div>
    </app-loader>
  </div>
</div>
