          <div class="stat-number">260+</div>
          <div class="stat-label">Event Organizers</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">500+</div>
          <div class="stat-label">Companies</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side - Sign Up Form -->
  <div class="form-section">
    <div class="form-wrapper">
      <div class="form-header">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Join our community today</p>
      </div>

      <form *ngIf="form" [formGroup]="form" (submit)="onRegister()">
        <div class="form-content">
          <!-- Profile Picture -->
          <div class="profile-picture-section">
            <app-profile-picture-upload
              [currentPictureUrl]="profilePictureUrl"
              (pictureChanged)="onProfilePictureChanged($event)"
              (pictureRemoved)="onProfilePictureRemoved()"
            ></app-profile-picture-upload>
          </div>

          <!-- Name Fields Row -->
          <div class="form-row">
            <div class="form-group">
              <label for="firstname" class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="currentColor"/>
                </svg>
                First Name
              </label>
              <input
                #first
                id="firstname"
                formControlName="firstname"
                placeholder="Enter your first name"
                type="text"
                class="form-input"
              />
              <app-validation-error [control]="registerForm.controls['firstname']"></app-validation-error>
            </div>

            <div class="form-group">
              <label for="lastname" class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="currentColor"/>
                </svg>
                Last Name
              </label>
              <input
                id="lastname"
                formControlName="lastname"
                placeholder="Enter your last name"
                type="text"
                class="form-input"
              />
              <app-validation-error [control]="registerForm.controls['lastname']"></app-validation-error>
            </div>
          </div>

          <!-- Email Field -->
          <div class="form-group">
            <label for="email" class="form-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z" fill="currentColor"/>
              </svg>
              Email Address
            </label>
            <input
              id="email"
              formControlName="email"
              placeholder="your.email@example.com"
              type="email"
              class="form-input"
            />
            <app-validation-error
              [control]="registerForm.controls['email']"
              [customErrorLabels]="{duplicateEntry: 'Email already registered'}"
            ></app-validation-error>
          </div>

          <!-- Phone Field -->
          <div class="form-group">
            <label for="phone" class="form-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M6.62 10.79C8.06 13.62 10.38 15.94 13.21 17.38L15.41 15.18C15.69 14.9 16.08 14.82 16.43 14.93C17.55 15.3 18.75 15.5 20 15.5C20.55 15.5 21 15.95 21 16.5V20C21 20.55 20.55 21 20 21C10.61 21 3 13.39 3 4C3 3.45 3.45 3 4 3H7.5C8.05 3 8.5 3.45 8.5 4C8.5 5.25 8.7 6.45 9.07 7.57C9.18 7.92 9.1 8.31 8.82 8.59L6.62 10.79Z" fill="currentColor"/>
              </svg>
              Phone Number
            </label>
            <angular-intl-phone formControlName="phone" [config]="config" />
            <app-validation-error [control]="registerForm.controls['phone']"></app-validation-error>
          </div>

          <!-- Talent Fields (toujours affichés) -->
          <div class="conditional-fields">
            
            <!-- Section: Informations Professionnelles -->
            <div class="section-title">Professional Information (Optional)</div>
            
            <!-- Values -->
            <div class="form-group">
              <label for="values" class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
                </svg>
                Values (Optional)
              </label>
              <ng-select
                formControlName="values"
                [items]="values"
                bindLabel="title"
                bindValue="id"
                placeholder="Select values"
                [multiple]="true"
                class="custom-select"
              >
              </ng-select>
            </div>

            <!-- CV Upload -->
            <div class="form-group">
              <label for="cv" class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M14 2H6C4.9 2 4.01 2.9 4.01 4L4 20C4 21.1 4.89 22 5.99 22H18C19.1 22 20 21.1 20 20V8L14 2ZM16 18H8V16H16V18ZM16 14H8V12H16V14ZM13 9V3.5L18.5 9H13Z" fill="currentColor"/>
                </svg>
                CV (PDF) - Optional
              </label>
              <div class="file-upload-wrapper">
                <label for="cv" class="file-upload-button">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M9 16H15V10H19L12 3L5 10H9V16ZM5 18H19V20H5V18Z" fill="currentColor"/>
                  </svg>
                  Choose File
                </label>
                <span class="file-upload-text">{{ registerForm.controls["cv"].value ?? "No file chosen" }}</span>
                <input
                  type="file"
                  id="cv"
                  formControlName="cv"
                  (change)="onCvChange($event)"
                  accept=".pdf"
                />
              </div>
              <app-validation-error
                [control]="registerForm.controls['cv']"
                [customErrorLabels]="{extensionError: 'Must be a PDF file'}"
              ></app-validation-error>
            </div>

            <!-- Years of Experience and Skills -->
            <div class="form-row">
              <div class="form-group">
                <label for="yearsOfExperience" class="form-label">Years of Experience</label>
                <input
                  id="yearsOfExperience"
                  formControlName="yearsOfExperience"
                  type="number"
                  placeholder="e.g., 5"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="competences" class="form-label">Skills</label>
                <input
                  id="competences"
                  formControlName="competences"
                  type="text"
                  placeholder="JavaScript, React, Node.js..."
                  class="form-input"
                />
              </div>
            </div>

            <!-- Languages and Formations -->
            <div class="form-row">
              <div class="form-group">
                <label for="languages" class="form-label">Languages</label>
                <input
                  id="languages"
                  formControlName="languages"
                  type="text"
                  placeholder="French (native), English (fluent)..."
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="formations" class="form-label">Education</label>
                <input
                  id="formations"
                  formControlName="formations"
                  type="text"
                  placeholder="Master in Computer Science..."
                  class="form-input"
                />
              </div>
            </div>

            <!-- Interests -->
            <div class="form-group">
              <label for="interests" class="form-label">Interests</label>
              <textarea
                id="interests"
                formControlName="interests"
                placeholder="Open source, AI, Blockchain..."
                class="form-input"
                rows="2"
              ></textarea>
            </div>

            <!-- Section: Salary & Compensation -->
            <div class="section-title">Salary & Compensation (Optional)</div>

            <!-- TJM and Annual Salary Row -->
            <div class="form-row">
              <div class="form-group">
                <label for="tjm" class="form-label">TJM (€)</label>
                <input
                  id="tjm"
                  formControlName="tjm"
                  type="number"
                  placeholder="Daily rate"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="annualSalary" class="form-label">Annual Salary/12</label>
                <input
                  id="annualSalary"
                  formControlName="annualSalary"
                  type="number"
                  placeholder="Monthly salary"
                  class="form-input"
                />
              </div>
            </div>

            <!-- Salary Range -->
            <div class="form-group">
              <label for="salaryRange" class="form-label">Desired Salary Range</label>
              <input
                id="salaryRange"
                formControlName="salaryRange"
                type="text"
                placeholder="45000-55000 €"
                class="form-input"
              />
            </div>

            <!-- Section: Location -->
            <div class="section-title">Location (Optional)</div>

            <!-- Country and City Row -->
            <div class="form-row">
              <div class="form-group">
                <label for="country" class="form-label">Country</label>
                <input
                  id="country"
                  formControlName="country"
                  type="text"
                  placeholder="France"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="city" class="form-label">City</label>
                <input
                  id="city"
                  formControlName="city"
                  type="text"
                  placeholder="Paris"
                  class="form-input"
                />
              </div>
            </div>

            <!-- Address and Postal Code Row -->
            <div class="form-row">
              <div class="form-group">
                <label for="address" class="form-label">Address</label>
                <input
                  id="address"
                  formControlName="address"
                  type="text"
                  placeholder="123 Rue de la Paix"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="postalCode" class="form-label">Postal Code</label>
                <input
                  id="postalCode"
                  formControlName="postalCode"
                  type="text"
                  placeholder="75001"
                  class="form-input"
                />
              </div>
            </div>

            <!-- Section: Job Preferences -->
            <div class="section-title">Job Preferences (Optional)</div>

            <!-- Desired Position and Contract Type -->
            <div class="form-row">
              <div class="form-group">
                <label for="desiredPosition" class="form-label">Desired Position</label>
                <input
                  id="desiredPosition"
                  formControlName="desiredPosition"
                  type="text"
                  placeholder="Full Stack Developer Senior"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="desiredContractType" class="form-label">Contract Type</label>
                <ng-select
                  formControlName="desiredContractType"
                  [items]="jobTypes$ | async"
                  bindLabel="name"
                  bindValue="name"
                  placeholder="Select contract type"
                  class="custom-select"
                >
                </ng-select>
              </div>
            </div>

            <!-- Desired Company Type and Sector -->
            <div class="form-row">
              <div class="form-group">
                <label for="desiredCompanyType" class="form-label">Company Type</label>
                <input
                  id="desiredCompanyType"
                  formControlName="desiredCompanyType"
                  type="text"
                  placeholder="Startup, Scale-up..."
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="desiredSector" class="form-label">Sector</label>
                <input
                  id="desiredSector"
                  formControlName="desiredSector"
                  type="text"
                  placeholder="Tech, FinTech..."
                  class="form-input"
                />
              </div>
            </div>

            <!-- Mobility and Desired Work Location Row -->
            <div class="form-row">
              <div class="form-group">
                <label for="mobility" class="form-label">Mobility</label>
                <input
                  id="mobility"
                  formControlName="mobility"
                  type="text"
                  placeholder="France, Europe..."
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="desiredWorkLocation" class="form-label">Desired Work Location</label>
                <input
                  id="desiredWorkLocation"
                  formControlName="desiredWorkLocation"
                  type="text"
                  placeholder="Paris or Remote..."
                  class="form-input"
                />
              </div>
            </div>

            <!-- Availability and Work Mode Row -->
            <div class="form-row">
              <div class="form-group">
                <label for="availabilityDate" class="form-label">Availability Date</label>
                <input
                  id="availabilityDate"
                  formControlName="availabilityDate"
                  type="date"
                  class="form-input"
                />
              </div>

              <div class="form-group">
                <label for="workMode" class="form-label">Work Mode</label>
                <ng-select
                  formControlName="workMode"
                  [items]="workModes$ | async"
                  bindLabel="name"
                  bindValue="name"
                  placeholder="Select work mode"
                  class="custom-select"
                >
                </ng-select>
              </div>
            </div>
          </div>

          <!-- Password Fields -->
          <div class="form-group">
