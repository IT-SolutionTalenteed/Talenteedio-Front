<footer [style.backgroundColor]="'white'">
  <div class="footer-bottom">
    <div class="bottom-container">
      <div class="terms">
        <a [localizedRouterLink]="[termsAndConditionsRoute]">{{ 'footer.termsAndConditions' | translate }}</a>
        <a [localizedRouterLink]="[privacyPolicyRoute]">{{ 'footer.confidentiality' | translate }}</a>
      </div>
      <div class="copiright">
        <div>
          @ {{ currentYear }}
          <a href="https://solutiontalenteed.com/" style="margin-left: 7px">
            Solution Talenteed</a
          >
          . {{ 'footer.allRightsReserved' | translate }}.
        </div>
      </div>
      <div class="links">
        <div *ngFor="let link of footerLinks">
          <a [href]="link.link" target="_blank">
            <fa-icon [icon]="link.icon"></fa-icon>
          </a>
        </div>
      </div>
    </div>
  </div>
</footer>
